trajectoryAlignment:
  gnssRate: 10 # [Hz], rate of gnss measurements
  lidarRate: 10 # [Hz], rate of lidar odometry
  minimumDistanceHeadingInit: 4.0 # [m], minimal length of trajectory to get yaw between GNSS and Lidar trajectory
  minimumSpatialSpread: 0.01 # [m], minimum spatial spread required for trajectory alignment
  noMovementDistance: 0.1 # [m], if measurements are below this distance and in time range, robot is considered standing
  noMovementTime: 1.0 # [s], if measurements is time range and below distance, robot is considered standing
  initSyncMaxDt: 0.50 # [s], maximum allowed time difference between GNSS and closest buffered LiDAR pose during GNSS/LiDAR init
