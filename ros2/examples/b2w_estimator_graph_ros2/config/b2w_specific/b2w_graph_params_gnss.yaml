/b2w_estimator_node:
  ros__parameters:
    # Sensor Params
    sensor_params:
      ## Config
      useGnss: true
      useLioOdometry: true
      useLioBetweenOdometry: false
      useWheelOdometryBetween: false
      useWheelLinearVelocities: false
      useVioOdometry: true
      useVioOdometryBetween: false
      ## Rates
      lioOdometryRate: 10
      lioBetweenRate: 200
      wheelOdometryBetweenRate: 100
      wheelLinearVelocitiesRate: 100
      vioOdometryRate: 10
      vioOdometryBetweenRate: 25
      gnssRate: 10

      # Wheel Radius
      wheelRadius: 0.195 # meters

    # Alignment Parameters
    alignment_params:
      initialSe3AlignmentNoiseDensity: [ 5.0, 5.0, 5.0, 5.0, 5.0, 5.0 ] # StdDev, ORDER RPY(rad) - XYZ(meters)
      lioSe3AlignmentRandomWalk: [ 0.5, 0.5, 0.5, 0.5, 0.5, 0.5 ] # StdDev, ORDER RPY(rad) - XYZ(meters)
      vioSe3AlignmentRandomWalk: [ 0.5, 0.5, 0.5, 0.5, 0.5, 0.5 ] # StdDev, ORDER RPY(rad) - XYZ(meters)

    # Noise Parameters
    noise_params:
      gnssPositionOutlierThreshold: 4.0 # meters
      ## LiDAR
      lioPoseUnaryNoiseDensity: [ 0.1, 0.1, 0.1, 0.05, 0.05, 0.05 ] # StdDev, ORDER RPY(rad) - XYZ(meters)
      lioPoseBetweenNoiseDensity: [ 0.02, 0.02, 0.02, 0.002, 0.002, 0.002 ] # StdDev, ORDER RPY(rad) - XYZ(meters)
      ## Wheel
      wheelPoseBetweenNoiseDensity: [ 0.1, 0.1, 0.1, 0.06, 0.06, 0.06 ] # StdDev, ORDER RPY(rad) - XYZ(meters)
      wheelLinearVelocitiesNoiseDensity: [ 0.2, 0.1, 0.01 ] # StdDev, ORDER VxVyVz(meters/sec)
      ## VIO
      vioPoseBetweenNoiseDensity: [ 100.0, 100.0, 100.0, 0.1, 0.1, 0.1 ] # StdDev, ORDER RPY(rad) - XYZ(meters)
      vioPoseUnaryNoiseDensity: [ 0.1, 0.1, 0.1, 0.05, 0.05, 0.05] # StdDev, ORDER RPY(rad) - XYZ(meters)
