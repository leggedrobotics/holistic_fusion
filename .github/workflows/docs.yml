name: Build and Deploy Documentation

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['**']

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Read the Docs (Sphinx) ---
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build Sphinx documentation
        working-directory: docs/docs_src/read_the_docs
        run: uv run make html

      - name: Copy Sphinx output to docs
        run: |
          mkdir -p docs/docs
          cp -r docs/docs_src/read_the_docs/_build/html/* docs/docs/

      # --- Doxygen ---
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Build Doxygen documentation
        run: doxygen docs/docs_src/doxy/Doxyfile

      # --- Upload artifact for Pages ---
      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
